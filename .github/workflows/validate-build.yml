name: Validate statistics and build

on:
  push:
    branches:
      - El-Kernel-2.0
      - main
  pull_request:
    branches:
      - El-Kernel-2.0
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Test statistics and build application
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Test descriptive statistics
        run: npm run test:stats

      - name: Build with Vite
        run: npm run build
