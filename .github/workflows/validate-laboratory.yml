name: Validate laboratory

on:
  push:
    branches:
      - El-Kernel-2.0
      - El-Kernel-2.0-completo
      - El-Kernel-2.0-portada
      - main
  pull_request:
    branches:
      - El-Kernel-2.0
      - El-Kernel-2.0-completo
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Test calculators and build application
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Run calculator tests
        run: npm run test:all

      - name: Build with Vite
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernel-homepage-preview
          path: dist
          if-no-files-found: error
          retention-days: 7
